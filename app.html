        // ============= CREATE AUCTION MODAL =============
        function CreateAuctionModal({ onClose, onSubmit }) {
            const { currentUser } = useContext(AppContext);
            const [step, setStep] = useState(1);
            const [form, setForm] = useState({
                title: '',
                category: 'Digital Art',
                description: '',
                image: '',
                startingBid: 100,
                reservePrice: 0,
                duration: 72, // hours
                shipping: 'Worldwide shipping, 3-5 business days',
                tags: '',
                collaborators: [],
                splitEqually: true,
                voiceNote: null,        // object URL of audio file
                voiceNoteDuration: 0    // seconds
            });
            const [collabSearch, setCollabSearch] = useState('');
            const [recording, setRecording] = useState(false);
            const [recordSeconds, setRecordSeconds] = useState(0);
            const recorderRef = useRef(null);
            const recordChunksRef = useRef([]);
            const recordTimerRef = useRef(null);

            const sellableCategories = CATEGORIES.filter(c => c !== 'All');

            // Live search for potential collaborators against Supabase profiles
            const [filteredCollabs, setFilteredCollabs] = useState([]);
            useEffect(() => {
                const q = collabSearch.trim();
                if (!q) { setFilteredCollabs([]); return; }
                let cancelled = false;
                const t = setTimeout(async () => {
                    try {
                        const results = await api.searchProfiles(q, currentUser?.id);
                        if (cancelled) return;
                        // Hide already-added collaborators
                        const filtered = results.filter(u =>
                            !form.collaborators.some(c => c.id === u.id || c.username === u.username)
                        );
                        setFilteredCollabs(filtered);
                    } catch (err) {
                        console.error('Collab search failed', err);
                    }
                }, 220);
                return () => { cancelled = true; clearTimeout(t); };
            }, [collabSearch, form.collaborators, currentUser?.id]);

            const totalCreators = 1 + form.collaborators.length; // primary + collabs
            const equalShare = Math.floor(100 / totalCreators);
            const remainder = 100 - equalShare * totalCreators;

            // Compute shares — if splitEqually, distribute evenly (give primary the remainder)
            const primaryShare = form.splitEqually
                ? equalShare + remainder
                : Math.max(0, 100 - form.collaborators.reduce((s, c) => s + (c.share || 0), 0));
            const displayedCollabs = form.splitEqually
                ? form.collaborators.map(c => ({ ...c, share: equalShare }))
                : form.collaborators;

            const handleImagePick = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                setForm(prev => ({ ...prev, image: url }));
            };

            const handleVoiceNotePick = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                const probe = new Audio();
                probe.preload = 'metadata';
                probe.src = url;
                probe.onloadedmetadata = () => {
                    const dur = isFinite(probe.duration) ? probe.duration : 0;
                    setForm(prev => ({ ...prev, voiceNote: url, voiceNoteDuration: dur }));
                };
                setTimeout(() => {
                    setForm(prev => prev.voiceNote ? prev : { ...prev, voiceNote: url, voiceNoteDuration: 0 });
                }, 800);
            };

            const handleClearVoiceNote = () => {
                if (form.voiceNote) URL.revokeObjectURL(form.voiceNote);
                setForm(prev => ({ ...prev, voiceNote: null, voiceNoteDuration: 0 }));
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const recorder = new MediaRecorder(stream);
                    recordChunksRef.current = [];
                    recorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) recordChunksRef.current.push(e.data);
                    };
                    recorder.onstop = () => {
                        const blob = new Blob(recordChunksRef.current, { type: 'audio/webm' });
                        const url = URL.createObjectURL(blob);
                        setForm(prev => ({ ...prev, voiceNote: url, voiceNoteDuration: recordSeconds }));
                        stream.getTracks().forEach(t => t.stop());
                    };
                    recorderRef.current = recorder;
                    setRecordSeconds(0);
                    recorder.start();
                    setRecording(true);
                    recordTimerRef.current = setInterval(() => {
                        setRecordSeconds(s => {
                            if (s >= 119) { stopRecording(); return s; }
                            return s + 1;
                        });
                    }, 1000);
                } catch (err) {
                    alert('Microphone access unavailable. You can upload an audio file instead.');
                }
            };

            const stopRecording = () => {
                if (recorderRef.current && recorderRef.current.state !== 'inactive') {
                    recorderRef.current.stop();
                }
                if (recordTimerRef.current) {
                    clearInterval(recordTimerRef.current);
                    recordTimerRef.current = null;
                }
                setRecording(false);
            };

            const fmtSeconds = (s) => {
                if (!s || !isFinite(s)) return '0:00';
                const m = Math.floor(s / 60);
                const sec = Math.floor(s % 60);
                return `${m}:${String(sec).padStart(2, '0')}`;
            };

            const addCollaborator = (user) => {
                if (form.collaborators.some(c => c.id === user.id)) return;
                const newCollab = {
                    id: user.id,
                    name: user.name,
                    image: user.image,
                    username: user.username || (user.name || '').toLowerCase().replace(/\s+/g, ''),
                    verified: user.verified || false,
                    share: 0
                };
                setForm(prev => ({
                    ...prev,
                    collaborators: [...prev.collaborators, newCollab]
                }));
                setCollabSearch('');
                setFilteredCollabs([]);
            };

            const removeCollaborator = (name) => {
                setForm(prev => ({
                    ...prev,
                    collaborators: prev.collaborators.filter(c => c.name !== name)
                }));
            };

            const updateCollabShare = (name, share) => {
                setForm(prev => ({
                    ...prev,
                    splitEqually: false,
                    collaborators: prev.collaborators.map(c =>
                        c.name === name ? { ...c, share: Math.max(0, Math.min(99, Number(share) || 0)) } : c
                    )
                }));
            };

            const resetEqualSplit = () => {
                setForm(prev => ({ ...prev, splitEqually: true }));
            };

            const canGoNext = () => {
                if (step === 1) return form.image && form.title.trim() && form.description.trim();
                if (step === 2) return true; // collaborators are optional
                if (step === 3) return form.startingBid > 0 && form.duration > 0;
                return true;
            };

            const handleSubmit = () => {
                const tags = form.tags
                    .split(',')
                    .map(t => t.trim().replace(/^#/, ''))
                    .filter(Boolean);

                const finalCollabs = form.splitEqually
                    ? form.collaborators.map(c => ({ ...c, share: equalShare }))
                    : form.collaborators;

                    title: form.title.trim(),
                    category: form.category,
                    description: form.description.trim(),
                    image: form.image,
                    startingBid: Number(form.startingBid),
                    reservePrice: Number(form.reservePrice) || 0,
                    endsIn: Number(form.duration),
                    tags,
                    shipping: form.shipping,
                    collaborators: finalCollabs,
                    primaryShare: form.splitEqually ? equalShare + remainder : primaryShare,
                    voiceNote: form.voiceNote || null,
                    voiceNoteDuration: form.voiceNoteDuration || 0
                });
            };

            return (

                                    style={{
                                        flex: 1, height: '4px', borderRadius: '2px',

                                    }}

                legalName: currentUser?.name || '',
                idType: 'Passport',

                idBackImage: null,
                socialHandle: '',
                portfolioUrl: '',
                sampleWorkImage: null,
                bio: '',
                acknowledgement: false
            });
            const idFrontRef = useRef(null);
            const idBackRef = useRef(null);
            const sampleRef = useRef(null);

            const handleFile = (key, file) => {
                if (!file) return;
                setForm(prev => ({ ...prev, [key]: URL.createObjectURL(file) }));
            };

            const canContinue = (() => {
                if (step === 1) return true;
                if (step === 2) return form.legalName.trim().length > 1 && form.idFrontImage;
                if (step === 3) return form.socialHandle.trim().length > 0 || form.portfolioUrl.trim().length > 0;
                if (step === 4) return form.acknowledgement;
                return false;

                if (!form.acknowledgement) return;

        // ============= LIVE AUCTION (VIEWER) =============
        function LiveAuctionScreen({ auction, currentBid, onPlaceBid, onClose }) {
            const { currentUser, showToast } = useContext(AppContext);
            const [bid, setBid] = useState(currentBid);
            const [chatInput, setChatInput] = useState('');
            const [feed, setFeed] = useState([]); // {kind:'bid'|'chat'|'join', user, text, amount}
            const [hearts, setHearts] = useState([]);
            const [viewers, setViewers] = useState(auction.liveViewers || 480);
            const feedIdRef = useRef(0);
            const heartIdRef = useRef(0);

            // Sync local bid as the canonical bid changes
            useEffect(() => { setBid(currentBid); }, [currentBid]);

            // Simulated incoming bids and chat messages
            useEffect(() => {
                if (!auction) return;
                const PEOPLE = (typeof BID_USERS !== 'undefined' && BID_USERS) || [
                    { name: 'Mason J.', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=mason' },
                    { name: 'Sky K.',   avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=sky' },
                    { name: 'Riya A.',  avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=riya' },
                    { name: 'Theo B.',  avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=theo' },
                    { name: 'Dani M.',  avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=dani' },
                ];
                const CHATS = [
                    "ohhh that color 🔥",
                    "is this the original box?",
                    "shipping to EU?",
                    "GLWS!!",
                    "first time bidder, hi everyone",
                    "I'm in for the next round",
                    "show the back?",
                    "going UP",
                    "@seller condition?",
                    "this is gorgeous",
                ];
                let alive = true;
                let runningBid = currentBid;
                const tick = () => {
                    if (!alive) return;
                    const r = Math.random();
                    const id = ++feedIdRef.current;
                    const person = PEOPLE[Math.floor(Math.random() * PEOPLE.length)];
                    if (r < 0.45) {
                        // bid
                        const inc = [25, 50, 100, 150, 250][Math.floor(Math.random() * 5)];
                        runningBid += inc;
                        setBid(runningBid);
                        setFeed(prev => [{ id, kind: 'bid', user: person, text: `bid $${runningBid}`, amount: runningBid }, ...prev].slice(0, 14));
                    } else if (r < 0.85) {
                        // chat
                        setFeed(prev => [{ id, kind: 'chat', user: person, text: CHATS[Math.floor(Math.random() * CHATS.length)] }, ...prev].slice(0, 14));
                    } else {
                        // join
                        setViewers(v => v + Math.floor(Math.random() * 12) + 1);
                        setFeed(prev => [{ id, kind: 'join', user: person, text: 'just joined' }, ...prev].slice(0, 14));
                    }
                    setTimeout(tick, 1100 + Math.random() * 1700);
                };
                const t = setTimeout(tick, 800);
                return () => { alive = false; clearTimeout(t); };
            }, [auction?.id]);

            // Hearts cleanup
            useEffect(() => {
                if (hearts.length === 0) return;
                const t = setTimeout(() => setHearts(prev => prev.slice(1)), 2400);
                return () => clearTimeout(t);
            }, [hearts]);

            const sendHeart = () => {
                const id = ++heartIdRef.current;
                const x = 70 + Math.random() * 60; // px from right
                setHearts(prev => [...prev, { id, x }]);
            };
            const sendChat = () => {
                if (!chatInput.trim()) return;
                const id = ++feedIdRef.current;
                setFeed(prev => [{
                    id,
                    kind: 'chat',
                    user: { name: currentUser?.name || 'You', avatar: currentUser?.image || 'https://api.dicebear.com/7.x/avataaars/svg?seed=me' },
                    text: chatInput.trim(),
                    isMine: true
                }, ...prev].slice(0, 14));
                setChatInput('');
            };
            const placeIncrement = (inc) => {
                const next = bid + inc;
                if (onPlaceBid) onPlaceBid(auction.id, next);
                setBid(next);
                const id = ++feedIdRef.current;
                setFeed(prev => [{
                    id, kind: 'bid',
                    user: { name: currentUser?.name || 'You', avatar: currentUser?.image || 'https://api.dicebear.com/7.x/avataaars/svg?seed=me' },
                    text: `bid $${next}`, amount: next, isMine: true
                }, ...prev].slice(0, 14));
                showToast && showToast(`Bid $${next} placed`, 'success');
            };

            const stageBg = `linear-gradient(135deg, #1e1b4b, #6d28d9, #db2777)`;

            return (
                <div className="live-overlay" onClick={(e) => e.stopPropagation()}>
                    <div className="live-stage" style={{ background: stageBg }}>
                        <img
                            className="live-stage-product"
                            src={safeImg(auction.image)}
                            onError={handleImgError}
                            alt={auction.title}
                        />

                        {/* Top bar */}
                        <div className="live-top-bar">
                            <div className="live-top-left">
                                <div className="live-top-creator">
                                    <img src={auction.creator?.image} alt={auction.creator?.name} onError={handleImgError} />
                                    <span className="live-top-creator-name">
                                        {auction.creator?.name}
                                        {auction.creator.verified && <span style={{ marginLeft: '4px', color: '#1d9bf0' }}>✓</span>}
                                    </span>
                                </div>
                                <span className="live-pill lg">Live</span>
                            </div>
                            <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                                <span className="live-viewers-pill">👁 {viewers.toLocaleString()}</span>
                                <button className="live-close-btn" onClick={onClose} aria-label="Close">✕</button>
                            </div>
                        </div>

                        {/* Title + bid card */}
                        <div className="live-info-strip">
                            <div className="live-info-card">
                                <div className="live-info-title">{auction.title}</div>
                                <div className="live-info-bid">${bid.toLocaleString()}</div>
                            </div>
                        </div>

                        {/* Floating hearts */}
                        {hearts.map(h => (
                            <span key={h.id} className="live-heart" style={{ right: `${h.x}px`, bottom: '180px' }}>
                                {['❤️', '💜', '🔥', '✨'][h.id % 4]}
                            </span>
                        ))}

                        {/* Bid + chat feed */}
                        <div className="live-bid-feed">
                            {feed.map(item => (
                                <div key={item.id} className={`live-bid-row ${item.kind === 'bid' ? 'bid' : ''}`}>
                                    <img src={item.user.avatar || item.user.image} alt={item.user.name} onError={handleImgError} />
                                    <span className="live-bid-row-name">{item.isMine ? 'You' : item.user.name}</span>
                                    <span className="live-bid-row-text">{item.text}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Bottom controls */}
                    <div className="live-chat-bar">
                        <div className="live-quick-chips">
                            <button className="live-quick-chip" onClick={() => placeIncrement(25)}>+ $25</button>
                            <button className="live-quick-chip" onClick={() => placeIncrement(50)}>+ $50</button>
                            <button className="live-quick-chip" onClick={() => placeIncrement(100)}>+ $100</button>
                            <button className="live-quick-chip" onClick={() => placeIncrement(250)}>+ $250</button>
                            <button className="live-quick-chip" onClick={() => placeIncrement(500)}>+ $500</button>
                        </div>
                        <div className="live-bid-row-inputs">
                            <input
                                className="live-input"
                                value={chatInput}
                                onChange={(e) => setChatInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && sendChat()}
                                placeholder="Say something..."
                            />
                            <button className="live-send-btn" onClick={sendChat} aria-label="Send">➤</button>
                            <button className="live-react-btn" onClick={sendHeart} aria-label="React">❤</button>
                            <button className="live-bid-btn-big" onClick={() => placeIncrement(100)}>
                                Bid ${bid + 100}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ============= GO LIVE BROADCASTER =============
        function GoLiveBroadcaster({ auction, currentBid, currentUser, onEnd }) {
            const [viewers, setViewers] = useState(1);
            const [feed, setFeed] = useState([]);
            const [bid, setBid] = useState(currentBid);
            const [elapsed, setElapsed] = useState(0); // seconds
            const [muted, setMuted] = useState(false);
            const idRef = useRef(0);

            useEffect(() => { setBid(currentBid); }, [currentBid]);

            useEffect(() => {
                const t = setInterval(() => setElapsed(e => e + 1), 1000);
                return () => clearInterval(t);
            }, []);

            useEffect(() => {
                const PEOPLE = (typeof BID_USERS !== 'undefined' && BID_USERS) || [
                    { name: 'Mason J.', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=mason' },
                    { name: 'Sky K.',   avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=sky' },
                    { name: 'Theo B.',  avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=theo' },
                ];
                const CHATS = ["just joined!", "looks amazing", "show closeup", "shipping to US?", "bidding now"];
                let alive = true;
                let running = currentBid;
                let v = 1;
                const tick = () => {
                    if (!alive) return;
                    const r = Math.random();
                    const id = ++idRef.current;
                    const p = PEOPLE[Math.floor(Math.random() * PEOPLE.length)];
                    if (r < 0.4) {
                        const inc = [25, 50, 100, 150][Math.floor(Math.random() * 4)];
                        running += inc;
                        setBid(running);
                        setFeed(prev => [{ id, kind: 'bid', user: p, text: `bid $${running}` }, ...prev].slice(0, 12));
                    } else if (r < 0.8) {
                        setFeed(prev => [{ id, kind: 'chat', user: p, text: CHATS[Math.floor(Math.random() * CHATS.length)] }, ...prev].slice(0, 12));
                    } else {
                        v += 1;
                        setViewers(vc => vc + 1);
                        setFeed(prev => [{ id, kind: 'join', user: p, text: 'just joined' }, ...prev].slice(0, 12));
                    }
                    setTimeout(tick, 900 + Math.random() * 1700);
                };
                // Ramp viewers quickly at the start
                const ramp = setInterval(() => setViewers(vc => vc + Math.floor(Math.random() * 4) + 1), 1200);
                setTimeout(() => clearInterval(ramp), 8000);
                const t = setTimeout(tick, 600);
                return () => { alive = false; clearTimeout(t); clearInterval(ramp); };
            }, [auction?.id]);

            const fmt = (s) => {
                const m = Math.floor(s / 60).toString().padStart(2, '0');
                const ss = (s % 60).toString().padStart(2, '0');
                return `${m}:${ss}`;
            };

            return (
                <div className="golive-broadcast-overlay" onClick={(e) => e.stopPropagation()}>
                    <div className="golive-stage">
                        {/* Top bar */}
                        <div className="live-top-bar">
                            <div className="live-top-left">
                                <span className="live-pill lg">Live · {fmt(elapsed)}</span>
                            </div>
                            <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                                <span className="live-viewers-pill">👁 {viewers.toLocaleString()}</span>
                                <button className="live-close-btn" onClick={onEnd} aria-label="End">✕</button>
                            </div>
                        </div>

                        {/* "Mirror" preview (avatar in big circle) */}
                        <img
                            className="golive-mirror"
                            src={currentUser?.image || 'https://api.dicebear.com/7.x/avataaars/svg?seed=me'}
                            alt="You on camera"
                            onError={handleImgError}
                        />

                        {/* Listing strip */}
                        <div className="live-info-strip">
                            <div className="live-info-card">
                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flex: 1, minWidth: 0 }}>
                                    <img src={safeImg(auction.image)} onError={handleImgError} alt={auction.title}
                                         style={{ width: 36, height: 36, borderRadius: 8, objectFit: 'cover' }} />
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div className="live-info-title">{auction.title}</div>
                                        <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.6)' }}>{auction.endsIn}h left</div>
                                    </div>
                                </div>
                                <div className="live-info-bid">${bid.toLocaleString()}</div>
                            </div>
                        </div>

                        {/* Feed */}
                        <div className="live-bid-feed">
                            {feed.map(item => (
                                <div key={item.id} className={`live-bid-row ${item.kind === 'bid' ? 'bid' : ''}`}>
                                    <img src={item.user.avatar || item.user.image} alt={item.user.name} onError={handleImgError} />
                                    <span className="live-bid-row-name">{item.user.name}</span>
                                    <span className="live-bid-row-text">{item.text}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Broadcaster controls */}
                    <div className="golive-controls">
                        <div className="golive-stat-row">
                            <div style={{ textAlign: 'center' }}>
                                <div className="golive-stat-num">{viewers}</div>
                                <div className="golive-stat-label">Viewers</div>
                            </div>
                            <div style={{ textAlign: 'center' }}>
                                <div className="golive-stat-num">{feed.filter(f => f.kind === 'bid').length}</div>
                                <div className="golive-stat-label">Bids</div>
                            </div>
                            <div style={{ textAlign: 'center' }}>
                                <div className="golive-stat-num">${bid.toLocaleString()}</div>
                                <div className="golive-stat-label">Top bid</div>
                            </div>
                            <div style={{ textAlign: 'center' }}>
                                <div className="golive-stat-num">{fmt(elapsed)}</div>
                                <div className="golive-stat-label">Live</div>
                            </div>
                        </div>
                        <div className="golive-action-row">
                            <button className="golive-action-btn" onClick={() => setMuted(m => !m)}>
                                {muted ? '🔇 Unmute' : '🎙 Mute'}
                            </button>
                            <button className="golive-action-btn" onClick={() => alert('Camera flipped')}>
                                🔄 Flip
                            </button>
                            <button className="golive-action-btn" onClick={() => alert('Listing pinned to top of feed')}>
                                📌 Pin
                            </button>
                            <button className="golive-action-btn danger" onClick={onEnd}>
                                ⏹ End
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ============= NAV ITEM =============
        function NavItem({ icon, label, active, onClick, badge }) {
            return (
                <div
                    className={`nav-item ${active ? 'active' : ''}`}
                    onClick={onClick}
                    style={{ position: 'relative' }}
                >
                    <div style={{ position: 'relative' }}>
                        {icon}
                        {badge > 0 && <span className="badge-count">{badge}</span>}
                    </div>
                    <div className="nav-label">{label}</div>
                </div>
            );
        }

        // ============= ERROR BOUNDARY =============
        class AppErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { error: null };
                this.handleReload = this.handleReload.bind(this);
            }
            static getDerivedStateFromError(error) {
                return { error };
            }
            componentDidCatch(error, info) {
                console.error('Aucty caught error:', error, info);
            }
            handleReload() {
                // Soft reset: clear error and force a reload to recover app state.
                this.setState({ error: null });
                try { window.location.reload(); } catch (e) {}
            }
            render() {
                if (this.state.error) {
                    const msg = String(
                        (this.state.error && (this.state.error.message || this.state.error.toString())) || 'Unknown error'
                    );
                    return (
                        <div style={{
                            padding: '24px',
                            fontFamily: 'system-ui, -apple-system, sans-serif',
                            background: '#0a0a0f',
                            color: 'white',
                            minHeight: '100vh',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center'
                        }}>
                            <div style={{ maxWidth: '480px', textAlign: 'center' }}>
                                <div style={{ fontSize: '48px', marginBottom: '12px' }}>⚠️</div>
                                <div style={{ fontSize: '20px', fontWeight: 700, marginBottom: '8px' }}>
                                    Something went wrong
                                </div>
                                <div style={{
                                    fontSize: '13px',
                                    color: '#9ca3af',
                                    marginBottom: '20px',
                                    wordBreak: 'break-word',
                                    fontFamily: 'ui-monospace, Menlo, monospace',
                                    background: '#1f1f2e',
                                    padding: '10px 12px',
                                    borderRadius: '8px'
                                }}>
                                    {msg}
                                </div>
                                <button
                                    onClick={this.handleReload}
                                    style={{
                                        background: '#7c3aed',
                                        color: 'white',
                                        border: 'none',
                                        padding: '10px 22px',
                                        borderRadius: '8px',
                                        fontSize: '14px',
                                        fontWeight: 600,
                                        cursor: 'pointer'
                                    }}
                                >
                                    Reload Aucty
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ============= RENDER =============
        ReactDOM.render(
            <AppErrorBoundary>
                <AuctyApp />
            </AppErrorBoundary>,
            document.getElementById('root')
        );
    </script>

    <!-- Register service worker (PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('sw.js').then(function (reg) {
                    // Prompt to update if a new worker is waiting on next load.
                    reg.addEventListener('updatefound', function () {
                        var nw = reg.installing;
                        if (!nw) return;
                        nw.addEventListener('statechange', function () {
                            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                                nw.postMessage({ type: 'SKIP_WAITING' });
                            }
                        });
                    });
                }).catch(function (err) {
                    console.warn('SW registration failed:', err);
                });

                // When the new SW takes control, reload so users get fresh HTML.
                var reloading = false;
                navigator.serviceWorker.addEventListener('controllerchange', function () {
                    if (reloading) return;
                    reloading = true;
                    window.location.reload();
                });
            });
        }
    </script>
</body>
</html>
